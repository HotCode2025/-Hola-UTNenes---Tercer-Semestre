<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="codigo.js" defer></script>
    <title>Web Viva</title>
  </head>
  <body>
    <section>
      <div class="color"></div>
      <div class="color"></div>
      <div class="color"></div>
      <div class="box">
        <div class="square" title="--i:0"></div>
        <div class="square" title="--i:1"></div>
        <div class="star" title="--i:2"></div>
        <div class="star" title="--i:3"></div>
        <div class="box" title="--i:4"></div>
        <div class="box" title="--i:5"></div>
        <div class="conteiner">
          <div class="form">
            <h2>Login Form</h2>
            <form id = "loginForm">
              <div class="inputBox">
                <input id="username" type="text" placeholder="Username" />
              </div>

              <div class="inputBox">
                <input id="password" type="password" placeholder="Password" />
              </div>

              <div class="inputBox">
                <input id="btn" type="submit" value="Login" />
              </div>

              <p class="forget">
                Forgot password ?

                <a href="">Click Here</a>
              </p>

              <p class="forget">
                Don't have an account ?

                <a >Sign Up</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
