<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenido</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="codigo.js" defer></script>
    <style>
      .welcome-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(to bottom, #999, #888);
        overflow: hidden;
      }

      .welcome-container h1 {
        position: relative;
        color: #fff;
        font-size: 48px;
        font-weight: 600;
        text-align: center;
        z-index: 10;
      }

      .welcome-container .color {
        position: absolute;
        filter: blur(150px);
      }

      .welcome-container .color:nth-child(1) {
        top: -350px;
        width: 600px;
        height: 600px;
        background: #ff359b;
      }

      .welcome-container .color:nth-child(2) {
        bottom: -150px;
        left: 100px;
        width: 500px;
        height: 500px;
        background: #fffd87;
      }

      .welcome-container .color:nth-child(3) {
        bottom: 50px;
        right: 100px;
        width: 300px;
        height: 300px;
        background: #00d2ff;
      }
    </style>
  </head>
  <body>
    <div class="welcome-container">
      <div class="color"></div>
      <div class="color"></div>
      <div class="color"></div>
      <h1>Bienvenido a tu página <span id="name"></span></h1>
    </div>
  </body>
</html>
