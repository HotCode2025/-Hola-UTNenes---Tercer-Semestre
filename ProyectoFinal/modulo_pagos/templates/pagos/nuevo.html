{% extends "base.html" %}
{% block title %}Registrar Pago{% endblock %}

{% block content %}
<h1>Registrar Nuevo Pago</h1>

<form method="POST" class="form">

    <div class="form-group">
        <label for="turno_id">Turno</label>
        <select name="turno_id" id="turno_id" required>
            <option value="">-- Seleccionar turno --</option>
            {% for turno in turnos %}
            <option value="{{ turno[0] }}">
                #{{ turno[0] }} — {{ turno[1] }} / {{ turno[2] }} — {{ turno[3] }} ({{ turno[4] }})
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="monto">Monto ($)</label>
        <input type="number" name="monto" id="monto" step="0.01" min="0" required>
    </div>

    <div class="form-group">
        <label for="metodo_pago">Método de Pago</label>
        <select name="metodo_pago" id="metodo_pago" required>
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="transferencia">Transferencia</option>
        </select>
    </div>

    <div class="form-group">
        <label for="estado">Estado</label>
        <select name="estado" id="estado" required>
            <option value="pendiente">Pendiente</option>
            <option value="pagado">Pagado</option>
        </select>
    </div>

    <div class="form-group">
        <label for="fecha_pago">Fecha de Pago</label>
        <input type="date" name="fecha_pago" id="fecha_pago">
        <small>Dejar vacío si está pendiente.</small>
    </div>

    <div class="form-group">
        <label for="observaciones">Observaciones</label>
        <textarea name="observaciones" id="observaciones" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-success">Guardar Pago</button>
        <a href="{{ url_for('ver_pagos') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>
{% endblock %}
