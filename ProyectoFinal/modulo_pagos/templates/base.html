<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pagos - Veterinaria{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">🐾 Veterinaria — Módulo de Pagos</div>
    <ul class="nav-links">
        <li><a href="{{ url_for('inicio') }}">Inicio</a></li>
        <li><a href="{{ url_for('ver_pagos') }}">Pagos</a></li>
        <li><a href="{{ url_for('nuevo_pago') }}">Registrar Pago</a></li>
        <li><a href="{{ url_for('estadisticas') }}">Estadísticas</a></li>
    </ul>
</nav>

<main class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</main>

</body>
</html>
